<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bottom Dock POC</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f4f2;
      --panel: #ffffff;
      --line: #dededb;
      --text: #16171a;
      --muted: #73747c;
      --dock: #e9e4de;
      --active: #151519;
      --shadow: 0 18px 52px rgba(18, 20, 24, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .phone {
      position: relative;
      width: min(430px, 100vw);
      min-height: 100vh;
      margin: 0 auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.7)),
        var(--bg);
      overflow: hidden;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    header {
      padding: 28px 24px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    header p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 17px;
    }

    main {
      padding: 14px 0 170px;
    }

    .row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) 42px;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.64);
    }

    .thumb {
      display: grid;
      place-items: center;
      width: 54px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ececeb;
      color: #707179;
    }

    .title {
      min-width: 0;
      font-weight: 760;
      font-size: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .type {
      margin-top: 2px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 600;
    }

    .external {
      color: #74757d;
    }

    .dock-zone {
      position: fixed;
      z-index: 10;
      left: 50%;
      bottom: max(34px, env(safe-area-inset-bottom));
      width: min(390px, calc(100vw - 26px));
      transform: translateX(-50%);
      pointer-events: none;
    }

    .dock-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 64px;
      gap: 12px;
      align-items: end;
    }

    .dock {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      min-height: 108px;
      padding: 30px 18px 22px;
      pointer-events: auto;
      --active-x: 58px;
    }

    .dock-shape {
      position: absolute;
      inset: 0 0 14px;
      z-index: 0;
      width: 100%;
      height: calc(100% - 14px);
      overflow: visible;
      filter: drop-shadow(0 18px 34px rgba(20, 22, 28, 0.13));
      pointer-events: none;
    }

    .dock-fill {
      fill: var(--dock);
    }

    .dock-item {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      align-items: center;
      min-width: 0;
      height: 56px;
      border: 0;
      background: transparent;
      color: #75767d;
      font: inherit;
      pointer-events: auto;
    }

    .dock-item:focus-visible,
    .chat:focus-visible {
      outline: none;
    }

    .dock-icon {
      display: grid;
      place-items: center;
      width: 46px;
      aspect-ratio: 1;
      border-radius: 999px;
      background: transparent;
      transition: transform 240ms cubic-bezier(.2,.8,.2,1), background 240ms ease, color 240ms ease;
    }

    .dock-item.active {
      color: var(--text);
    }

    .dock-item.active::before {
      content: none;
    }

    .dock-item.active .dock-icon {
      width: 70px;
      color: #fff;
      background: var(--active);
      box-shadow: 0 18px 28px rgba(20,22,28,0.17);
      transform: translateY(-39px);
    }

    .dock-label {
      position: absolute;
      top: 76px;
      left: 50%;
      transform: translateX(calc(-50% + 6px));
      display: none;
      width: 94px;
      overflow: hidden;
      color: var(--text);
      font-size: 15px;
      font-weight: 760;
      line-height: 1;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dock-item.active .dock-label {
      display: block;
    }

    .chat {
      display: grid;
      place-items: center;
      width: 58px;
      aspect-ratio: 1;
      border: 0;
      border-radius: 999px;
      background: #e9e4de;
      color: #6f7078;
      box-shadow: 0 18px 34px rgba(20, 22, 28, 0.12);
      margin-bottom: 14px;
      pointer-events: auto;
    }

    .thumb svg,
    .external svg,
    .dock-icon svg,
    .chat svg {
      width: 25px;
      height: 25px;
      stroke-width: 2.35;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 370px) {
      .dock-zone {
        width: calc(100vw - 18px);
      }

      .dock-row {
        gap: 9px;
        grid-template-columns: minmax(0, 1fr) 58px;
      }

      .dock {
        min-height: 104px;
        padding-inline: 14px;
      }

      .dock-icon {
        width: 42px;
      }

      .dock-item.active .dock-icon {
        width: 64px;
        transform: translateY(-36px);
      }

      .chat {
        width: 54px;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <header>
      <h1>High Performance Computing</h1>
      <p>Materialien</p>
    </header>

    <main aria-label="Course resources">
      <div class="row">
        <div class="thumb"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg></div>
        <div><div class="title">Nachrichten</div><div class="type">resource</div></div>
        <div class="external"><svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></div>
      </div>
      <div class="row">
        <div class="thumb"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg></div>
        <div><div class="title">Modulbeschreibungen</div><div class="type">resource</div></div>
        <div class="external"><svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></div>
      </div>
      <div class="row">
        <div class="thumb"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg></div>
        <div><div class="title">Ankündigungen</div><div class="type">resource</div></div>
        <div class="external"><svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></div>
      </div>
      <div class="row">
        <div class="thumb"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg></div>
        <div><div class="title">Webex</div><div class="type">resource</div></div>
        <div class="external"><svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></div>
      </div>
    </main>

    <nav class="dock-zone" aria-label="Course dock">
      <div class="dock-row">
        <div class="dock">
          <svg class="dock-shape" viewBox="0 0 360 96" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <clipPath id="dockBubbleClip" clipPathUnits="userSpaceOnUse">
                <path class="dock-clip-path"></path>
              </clipPath>
            </defs>
            <rect class="dock-fill" x="-56" width="472" height="96" clip-path="url(#dockBubbleClip)"></rect>
          </svg>
          <button class="dock-item active" aria-current="page" aria-label="Material">
            <span class="dock-icon"><svg viewBox="0 0 24 24"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M15 2v5h5"/><path d="M9 13h6M9 17h4"/></svg></span>
            <span class="dock-label">Material</span>
          </button>
          <button class="dock-item" aria-label="Aufgaben">
            <span class="dock-icon"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg></span>
            <span class="dock-label">Aufgaben</span>
          </button>
          <button class="dock-item" aria-label="Script">
            <span class="dock-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/><path d="M8 6h8M8 10h8"/></svg></span>
            <span class="dock-label">Script</span>
          </button>
          <button class="dock-item" aria-label="Videos">
            <span class="dock-icon"><svg viewBox="0 0 24 24"><path d="M15 10.5 21 7v10l-6-3.5z"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg></span>
            <span class="dock-label">Videos</span>
          </button>
        </div>
        <button class="chat" aria-label="Chat">
          <svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
        </button>
      </div>
    </nav>
  </div>
  <script>
    const dock = document.querySelector('.dock');
    const items = [...document.querySelectorAll('.dock-item')];
    const dockClipPath = document.querySelector('.dock-clip-path');

    function createDockPath(center) {
      const left = 2;
      const right = 358;
      const top = 30;
      const bottom = 94;
      const radius = 32;
      const leftShoulder = center - 82;
      const rightShoulder = center + 82;
      const peak = 18;
      const neck = 32;
      const c = (value) => Number(value.toFixed(2));
      const x = (value) => c(Math.max(left + radius, Math.min(right - radius, value)));

      return [
        `M ${left + radius} ${top}`,
        `C ${left + 14} ${top} ${left} ${top + 14} ${left} ${top + radius}`,
        `C ${left} ${bottom - 14} ${left + 14} ${bottom} ${left + radius} ${bottom}`,
        `H ${right - radius}`,
        `C ${right - 14} ${bottom} ${right} ${bottom - 14} ${right} ${top + radius}`,
        `C ${right} ${top + 14} ${right - 14} ${top} ${right - radius} ${top}`,
        `H ${x(rightShoulder)}`,
        `C ${x(center + 70)} ${top} ${x(center + 62)} ${neck} ${x(center + 52)} 17`,
        `C ${x(center + 40)} 8 ${x(center + 24)} ${peak} ${x(center)} ${peak}`,
        `C ${x(center - 24)} ${peak} ${x(center - 40)} 8 ${x(center - 52)} 17`,
        `C ${x(center - 62)} ${neck} ${x(center - 70)} ${top} ${x(leftShoulder)} ${top}`,
        `H ${left + radius}`,
        'Z',
      ].join(' ');
    }

    function syncDockBulge() {
      const active = document.querySelector('.dock-item.active');
      const dockBox = dock.getBoundingClientRect();
      const activeIconBox = active.querySelector('.dock-icon').getBoundingClientRect();
      const center = activeIconBox.left - dockBox.left + activeIconBox.width / 2;
      dock.style.setProperty('--active-x', `${center}px`);
      const centerInViewBox = center / dockBox.width * 360;
      const path = createDockPath(centerInViewBox);
      dockClipPath.setAttribute('d', path);
    }

    items.forEach((item) => {
      item.addEventListener('click', () => {
        items.forEach((candidate) => {
          candidate.classList.toggle('active', candidate === item);
          candidate.toggleAttribute('aria-current', candidate === item);
        });
        syncDockBulge();
      });
    });

    window.addEventListener('resize', syncDockBulge);
    syncDockBulge();
  </script>
</body>
</html>
