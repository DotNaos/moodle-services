name: Container Image Multi-Arch

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish as a multi-arch image
        required: true
        type: string
      update_latest:
        description: Also update the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  container-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image names
        id: image
        shell: bash
        run: |
          set -euo pipefail

          base_hash="$(sha256sum docker/runtime-base/Dockerfile go.mod go.sum | sha256sum | cut -c1-16)"
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
          echo "base=ghcr.io/${GITHUB_REPOSITORY,,}-runtime-base:bookworm-${base_hash}" >> "${GITHUB_OUTPUT}"

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.update_latest == true }}

      - name: Build and push multi-arch container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNTIME_BASE_IMAGE=${{ steps.image.outputs.base }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
