name: Runtime Base Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/runtime-base/Dockerfile
      - go.mod
      - go.sum
      - .github/workflows/runtime-base-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          hash="$(sha256sum docker/runtime-base/Dockerfile go.mod go.sum | sha256sum | cut -c1-16)"
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-runtime-base" >> "${GITHUB_OUTPUT}"
          echo "tag=bookworm-${hash}" >> "${GITHUB_OUTPUT}"

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=bookworm
            type=raw,value=${{ steps.image.outputs.tag }}

      - name: Build and push runtime base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime-base
          cache-to: type=gha,mode=max,scope=runtime-base
