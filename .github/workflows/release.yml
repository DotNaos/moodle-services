name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string
      prerelease:
        description: Mark the release as unstable
        required: false
        default: false
        type: boolean
      release_name:
        description: Optional release title override
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      release_name: ${{ steps.resolve.outputs.release_name }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          set -euo pipefail

          release_tag="${INPUT_TAG:-}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi

          prerelease="${INPUT_PRERELEASE:-false}"
          release_name="${INPUT_RELEASE_NAME:-${release_tag}}"

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "ref=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

  release:
    needs: resolve-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Check if release already exists
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ needs.resolve-release.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run GoReleaser
        if: github.event_name == 'push' || steps.release_state.outputs.exists != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release metadata
        if: needs.resolve-release.outputs.prerelease == 'true' || needs.resolve-release.outputs.release_name != needs.resolve-release.outputs.tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--title "${{ needs.resolve-release.outputs.release_name }}")
          if [[ "${{ needs.resolve-release.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release edit "${{ needs.resolve-release.outputs.tag }}" "${args[@]}"

  runtime-base-image:
    needs:
      - resolve-release
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image.outputs.ref }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          hash="$(sha256sum docker/runtime-base/Dockerfile go.mod go.sum | sha256sum | cut -c1-16)"
          name="ghcr.io/${GITHUB_REPOSITORY,,}-runtime-base"
          tag="bookworm-${hash}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "ref=${name}:${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check runtime base image
        id: base
        continue-on-error: true
        shell: bash
        run: docker buildx imagetools inspect "${{ steps.image.outputs.ref }}" >/dev/null

      - name: Prepare runtime base metadata
        id: meta
        if: steps.base.outcome != 'success'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=bookworm
            type=raw,value=${{ steps.image.outputs.tag }}

      - name: Build and push runtime base image
        if: steps.base.outcome != 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime-base
          cache-to: type=gha,mode=max,scope=runtime-base

  container-image:
    needs:
      - resolve-release
      - release
      - runtime-base-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.resolve-release.outputs.tag }}
            type=raw,value=${{ needs.resolve-release.outputs.tag }}-amd64
            type=raw,value=latest,enable=${{ needs.resolve-release.outputs.prerelease != 'true' }}
            type=raw,value=latest-amd64,enable=${{ needs.resolve-release.outputs.prerelease != 'true' }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNTIME_BASE_IMAGE=${{ needs.runtime-base-image.outputs.image-ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  macos-installers:
    needs:
      - resolve-release
      - release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v5

      - name: Warn when macOS signing is not configured
        env:
          APPLE_APPLICATION_CERTIFICATE_P12: ${{ secrets.APPLE_APPLICATION_CERTIFICATE_P12 }}
          APPLE_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_APPLICATION_SIGNING_IDENTITY: ${{ secrets.APPLE_APPLICATION_SIGNING_IDENTITY }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          certificate_ready=false
          notarization_ready=false

          if [[ -n "${APPLE_APPLICATION_CERTIFICATE_P12}" && -n "${APPLE_APPLICATION_CERTIFICATE_PASSWORD}" ]]; then
            certificate_ready=true
          elif [[ -n "${CSC_LINK}" && -n "${CSC_KEY_PASSWORD}" ]]; then
            certificate_ready=true
          fi

          if [[ -n "${APPLE_NOTARY_APPLE_ID}" && -n "${APPLE_NOTARY_TEAM_ID}" && -n "${APPLE_NOTARY_PASSWORD}" ]]; then
            notarization_ready=true
          elif [[ -n "${APPLE_ID}" && -n "${APPLE_TEAM_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" ]]; then
            notarization_ready=true
          fi

          if [[ "${certificate_ready}" != "true" ]]; then
            echo "::warning::macOS app bundle will be unsigned because neither APPLE_APPLICATION_CERTIFICATE_* nor CSC_* secrets are configured."
          fi

          if [[ "${notarization_ready}" != "true" ]]; then
            echo "::warning::macOS app bundle will not be notarized because neither APPLE_NOTARY_* nor APPLE_ID/APPLE_TEAM_ID/APPLE_APP_SPECIFIC_PASSWORD secrets are configured."
          fi

      - name: Import Apple application certificate
        env:
          APPLE_APPLICATION_CERTIFICATE_P12: ${{ secrets.APPLE_APPLICATION_CERTIFICATE_P12 }}
          APPLE_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_APPLICATION_SIGNING_IDENTITY: ${{ secrets.APPLE_APPLICATION_SIGNING_IDENTITY }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ (-z "${APPLE_APPLICATION_CERTIFICATE_P12}" || -z "${APPLE_APPLICATION_CERTIFICATE_PASSWORD}") && (-z "${CSC_LINK}" || -z "${CSC_KEY_PASSWORD}") ]]; then
            echo "No macOS application certificate configured. Skipping import."
            exit 0
          fi

          keychain_path="${RUNNER_TEMP}/moodle-release.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          certificate_path="${RUNNER_TEMP}/moodle-application-cert.p12"

          python3 -c 'import base64, os, pathlib, sys, urllib.parse; certificate_value = os.environ.get("APPLE_APPLICATION_CERTIFICATE_P12") or os.environ.get("CSC_LINK") or ""; assert certificate_value, "missing application certificate secret"; cert_bytes = (base64.b64decode(certificate_value.split(",", 1)[1]) if certificate_value.startswith("data:") and ";base64" in certificate_value.split(",", 1)[0] else urllib.parse.unquote_to_bytes(certificate_value.split(",", 1)[1]) if certificate_value.startswith("data:") else base64.b64decode(certificate_value)); pathlib.Path(sys.argv[1]).write_bytes(cert_bytes)' "${certificate_path}"

          certificate_password="${APPLE_APPLICATION_CERTIFICATE_PASSWORD:-${CSC_KEY_PASSWORD}}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${certificate_password}" \
            -f pkcs12 \
            -A
          security list-keychains -d user -s "${keychain_path}" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"

          application_identity="${APPLE_APPLICATION_SIGNING_IDENTITY:-}"
          if [[ -z "${application_identity}" ]]; then
            application_identity="$(security find-identity -v -p codesigning "${keychain_path}" | sed -n 's/.*\"\\(Developer ID Application: [^\"]*\\)\".*/\\1/p' | head -n1)"
          fi

          if [[ -z "${application_identity}" ]]; then
            echo "::error::No Developer ID Application identity found in the imported certificate."
            exit 1
          fi

          notary_apple_id="${APPLE_NOTARY_APPLE_ID:-${APPLE_ID}}"
          notary_team_id="${APPLE_NOTARY_TEAM_ID:-${APPLE_TEAM_ID}}"
          notary_password="${APPLE_NOTARY_PASSWORD:-${APPLE_APP_SPECIFIC_PASSWORD}}"

          {
            echo "MACOS_SIGNING_KEYCHAIN=${keychain_path}"
            echo "MACOS_SIGNING_KEYCHAIN_PASSWORD=${keychain_password}"
            echo "MACOS_APPLICATION_SIGNING_IDENTITY=${application_identity}"
            echo "MACOS_NOTARY_APPLE_ID=${notary_apple_id}"
            echo "MACOS_NOTARY_TEAM_ID=${notary_team_id}"
            echo "MACOS_NOTARY_PASSWORD=${notary_password}"
          } >> "${GITHUB_ENV}"

      - name: Download release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/downloads
          gh release download "${{ needs.resolve-release.outputs.tag }}" \
            --pattern "moodle_darwin_${{ matrix.arch }}.tar.gz" \
            --dir dist/downloads

      - name: Build app bundle
        run: |
          mkdir -p dist/installers
          bash packaging/macos/build-app.sh \
            --archive "dist/downloads/moodle_darwin_${{ matrix.arch }}.tar.gz" \
            --version "${{ needs.resolve-release.outputs.tag }}" \
            --output "dist/installers/moodle-services.app"

      - name: Sign app bundle contents
        if: env.MACOS_APPLICATION_SIGNING_IDENTITY != ''
        run: |
          app_path="dist/installers/moodle-services.app"
          codesign --force --options runtime --timestamp \
            --keychain "${MACOS_SIGNING_KEYCHAIN}" \
            --sign "${MACOS_APPLICATION_SIGNING_IDENTITY}" \
            "${app_path}/Contents/Resources/bin/moodle"

      - name: Sign app bundle
        if: env.MACOS_APPLICATION_SIGNING_IDENTITY != ''
        run: |
          app_path="dist/installers/moodle-services.app"
          codesign --force --options runtime --timestamp \
            --keychain "${MACOS_SIGNING_KEYCHAIN}" \
            --sign "${MACOS_APPLICATION_SIGNING_IDENTITY}" \
            "${app_path}"
          codesign --verify --deep --strict --verbose=2 "${app_path}"

      - name: Notarize app bundle
        id: notarize_app
        if: env.MACOS_APPLICATION_SIGNING_IDENTITY != '' && env.MACOS_NOTARY_APPLE_ID != '' && env.MACOS_NOTARY_TEAM_ID != '' && env.MACOS_NOTARY_PASSWORD != ''
        continue-on-error: true
        run: |
          app_path="dist/installers/moodle-services.app"
          zip_path="dist/installers/moodle_darwin_${{ matrix.arch }}.zip"
          ditto -c -k --keepParent "${app_path}" "${zip_path}"
          xcrun notarytool submit "${zip_path}" \
            --apple-id "${MACOS_NOTARY_APPLE_ID}" \
            --team-id "${MACOS_NOTARY_TEAM_ID}" \
            --password "${MACOS_NOTARY_PASSWORD}" \
            --wait
          xcrun stapler staple "${app_path}"

      - name: Warn when app notarization fails
        if: steps.notarize_app.outcome == 'failure'
        run: |
          echo "::warning::App notarization failed for macOS ${{ matrix.arch }}. Continuing with a signed but unstapled app bundle and DMG."

      - name: Build DMG installer
        run: |
          mkdir -p dist/installers
          bash packaging/macos/create-dmg.sh \
            --version "${{ needs.resolve-release.outputs.tag }}" \
            --app "dist/installers/moodle-services.app" \
            --output "dist/installers/moodle_darwin_${{ matrix.arch }}.dmg"

      - name: Notarize DMG installer
        id: notarize_dmg
        if: env.MACOS_APPLICATION_SIGNING_IDENTITY != '' && env.MACOS_NOTARY_APPLE_ID != '' && env.MACOS_NOTARY_TEAM_ID != '' && env.MACOS_NOTARY_PASSWORD != '' && steps.notarize_app.outcome != 'failure'
        continue-on-error: true
        run: |
          dmg_path="dist/installers/moodle_darwin_${{ matrix.arch }}.dmg"
          xcrun notarytool submit "${dmg_path}" \
            --apple-id "${MACOS_NOTARY_APPLE_ID}" \
            --team-id "${MACOS_NOTARY_TEAM_ID}" \
            --password "${MACOS_NOTARY_PASSWORD}" \
            --wait
          xcrun stapler staple "${dmg_path}"

      - name: Warn when DMG notarization fails
        if: steps.notarize_dmg.outcome == 'failure'
        run: |
          echo "::warning::DMG notarization failed for macOS ${{ matrix.arch }}. Uploading the signed DMG without stapling."

      - name: Upload DMG installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.resolve-release.outputs.tag }}" \
            "dist/installers/moodle_darwin_${{ matrix.arch }}.dmg" \
            --clobber

      - name: Clean up Apple signing keychain
        if: always() && env.MACOS_SIGNING_KEYCHAIN != ''
        run: |
          security delete-keychain "${MACOS_SIGNING_KEYCHAIN}" || true

  windows-installers:
    needs:
      - resolve-release
      - release
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Download release archive
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path dist\downloads | Out-Null
          gh release download "${{ needs.resolve-release.outputs.tag }}" `
            --pattern "moodle_windows_${{ matrix.arch }}.zip" `
            --dir dist\downloads

      - name: Build EXE installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\installers | Out-Null
          .\packaging\windows\build-installer.ps1 `
            -ArchivePath "dist\downloads\moodle_windows_${{ matrix.arch }}.zip" `
            -Version "${{ needs.resolve-release.outputs.tag }}" `
            -Arch "${{ matrix.arch }}" `
            -OutputDir "dist\installers"

      - name: Upload EXE installer
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.resolve-release.outputs.tag }}" `
            "dist\installers\moodle_windows_${{ matrix.arch }}_setup.exe" `
            --clobber
