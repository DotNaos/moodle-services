name: Release From PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  actions: write
  contents: write

concurrency:
  group: release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-pr:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Publish unstable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          stable_tags() {
            git tag --list 'v*' \
              | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/' \
              | sort -V
          }

          slugify_branch() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g'
          }

          git fetch --tags --force

          latest_stable="$(stable_tags | tail -n1 || true)"
          if [[ -z "${latest_stable}" ]]; then
            latest_stable="v0.1.0"
          fi

          branch_slug="$(slugify_branch "${PR_REF}")"
          if [[ -z "${branch_slug}" ]]; then
            branch_slug="branch"
          fi

          previous_tags="$(git tag --list "${latest_stable}-canary.${branch_slug}.*" | sort -V || true)"
          prerelease_number="$(printf '%s\n' "${previous_tags}" | sed '/^$/d' | wc -l | tr -d ' ')"
          prerelease_number="$((prerelease_number + 1))"

          unstable_tag="${latest_stable}-canary.${branch_slug}.${prerelease_number}"
          unstable_name="${unstable_tag}"

          while IFS= read -r old_tag; do
            [[ -z "${old_tag}" ]] && continue
            gh release delete "${old_tag}" --yes >/dev/null 2>&1 || true
            git push origin ":refs/tags/${old_tag}" >/dev/null 2>&1 || true
            git tag -d "${old_tag}" >/dev/null 2>&1 || true
          done <<< "${previous_tags}"

          while IFS= read -r legacy_tag; do
            [[ -z "${legacy_tag}" ]] && continue
            gh release delete "${legacy_tag}" --yes >/dev/null 2>&1 || true
            git push origin ":refs/tags/${legacy_tag}" >/dev/null 2>&1 || true
            git tag -d "${legacy_tag}" >/dev/null 2>&1 || true
          done < <(git tag --list "v*-unstable.pr${PR_NUMBER}*" | sort -V)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${unstable_tag}" "${PR_SHA}" -m "Unstable release ${unstable_tag}"
          git push origin "${unstable_tag}"

          gh workflow run release.yml \
            --ref "${PR_REF}" \
            -f tag="${unstable_tag}" \
            -f prerelease=true \
            -f release_name="${unstable_name}"

  cleanup-pr:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Delete unstable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          slugify_branch() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g'
          }

          git fetch --tags --force

          branch_slug="$(slugify_branch "${PR_REF}")"

          while IFS= read -r unstable_tag; do
            [[ -z "${unstable_tag}" ]] && continue
            gh release delete "${unstable_tag}" --yes >/dev/null 2>&1 || true
            git push origin ":refs/tags/${unstable_tag}" >/dev/null 2>&1 || true
            git tag -d "${unstable_tag}" >/dev/null 2>&1 || true
          done < <(
            {
              git tag --list "v*-canary.${branch_slug}.*"
              git tag --list "v*-unstable.pr${PR_NUMBER}*"
            } | sort -V | uniq
          )
