name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime base image
        id: runtime_base
        shell: bash
        run: |
          set -euo pipefail

          hash="$(sha256sum docker/runtime-base/Dockerfile go.mod go.sum | sha256sum | cut -c1-16)"
          echo "ref=ghcr.io/dotnaos/moodle-services-runtime-base:bookworm-${hash}" >> "${GITHUB_OUTPUT}"

      - name: Pull runtime base image
        id: pull_runtime_base
        continue-on-error: true
        shell: bash
        run: |
          docker pull "${{ steps.runtime_base.outputs.ref }}"
          docker tag "${{ steps.runtime_base.outputs.ref }}" moodle-services-runtime-base:ci

      - name: Build runtime base image fallback
        if: steps.pull_runtime_base.outcome != 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime-base/Dockerfile
          load: true
          tags: moodle-services-runtime-base:ci

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: moodle-services:test
          build-args: |
            RUNTIME_BASE_IMAGE=moodle-services-runtime-base:ci
